# ── Prefix ──────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g extended-keys on
set -as terminal-features "*:extkeys"
set -g escape-time 0          # no delay after Escape (critical for nvim)
set -g focus-events on        # pass focus events through to nvim
set -g history-limit 50000
set -g mouse on

# ── Windows & panes — 1-indexed ──────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ── Vi mode ─────────────────────────────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Window navigation ────────────────────────────────────────────────────────
bind -n M-h previous-window   # Alt+h / Alt+l to switch windows without prefix
bind -n M-l next-window
bind -r "<" swap-window -d -t -1   # reorder windows left/right
bind -r ">" swap-window -d -t +1

# ── Splits (pain-control style, keep current path) ──────────────────────────
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind "%" split-window -h -c "#{pane_current_path}"   # override default
bind '"' split-window -v -c "#{pane_current_path}"   # override default
bind c   new-window      -c "#{pane_current_path}"

# ── Reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ── Plugins ─────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'christoomey/vim-tmux-navigator'

# vim-tmux-navigator: C-h/j/k/l pane navigation (also works with nvim splits)
# Note: some terminals send C-h as backspace — if C-h doesn't work, add this
# to your terminal profile: map \x08 to \x1b[104;5u (CSI u encoding)
set -g @vim_tmux_navigator_no_wrap "1"

# ── Bootstrap TPM (auto-installs if missing) ─────────────────────────────────
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
